# VidyutDrishti - Docker Compose (skeleton).
# Final wiring (seeder, scheduler, healthchecks, volumes, network) is
# completed in Feature 22.

services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg15
    container_name: vd-timescaledb
    restart: unless-stopped
    # Credentials MUST come from infra/.env - compose refuses to start
    # if DB_PASSWORD is unset. `cp infra/.env.sample infra/.env` and
    # change the password before first use.
    env_file:
      - infra/.env
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set in infra/.env}
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in infra/.env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in infra/.env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    container_name: vd-backend
    restart: unless-stopped
    env_file:
      - infra/.env
    depends_on:
      - timescaledb
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    container_name: vd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
