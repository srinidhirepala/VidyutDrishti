# VidyutDrishti - Docker Compose (skeleton).
# Final wiring (seeder, scheduler, healthchecks, volumes, network) is
# completed in Feature 22.

services:
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg15
    container_name: vd-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vidyutdrishti}
      POSTGRES_USER: ${DB_USER:-vidyutdrishti}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vidyutdrishti}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: infra/Dockerfile.backend
    container_name: vd-backend
    restart: unless-stopped
    env_file:
      - infra/.env.sample
    depends_on:
      - timescaledb
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: infra/Dockerfile.frontend
    container_name: vd-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
